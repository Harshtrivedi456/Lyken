{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Students Enrolled in {{ course.code }}</h2>
        <a href="{{ url_for('course_page', course_id=course.id) }}" class="btn btn-outline-secondary rounded-pill">Back to Course</a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th class="ps-4">Student Name</th>
                        <th>Email Address</th>
                        <th class="text-end pe-4">Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for student in course.students %}
                    <tr>
                        <td class="ps-4 fw-bold">{{ student.username }}</td>
                        <td>{{ student.email }}</td>
                        <td class="text-end pe-4">
                            <form action="{{ url_for('remove_student', course_id=course.id, user_id=student.id) }}" method="POST" onsubmit="return confirm('Are you sure you want to remove this student?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill">
                                    <i class="bi bi-trash me-1"></i> Remove
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center py-4 text-muted">No students enrolled in this course yet.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
